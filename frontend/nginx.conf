server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  # Some bot/challenge flows may POST to SPA routes (/ or /battles).
  # Without this fallback nginx returns 405 and the tab gets stuck on error page.
  error_page 405 =200 /index.html;

  # Max 80 concurrent connections per client IP (Caddy proxies as H1, so this counts real connections).
  limit_conn frontend_conn 80;
  # 30 req/s per IP, burst up to 200 before returning 429.
  limit_req zone=frontend_req burst=200 nodelay;
  limit_req_status 429;
  limit_conn_status 429;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri /index.html;
  }
}
